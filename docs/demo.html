<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Stats UI Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "@radix-ui/react-select": "https://esm.sh/@radix-ui/react-select@2.2.5?external=react,react-dom",
          "@radix-ui/react-separator": "https://esm.sh/@radix-ui/react-separator@1.1.7?external=react,react-dom",
          "@radix-ui/react-tabs": "https://esm.sh/@radix-ui/react-tabs@1.1.13?external=react,react-dom",
          "@radix-ui/react-tooltip": "https://esm.sh/@radix-ui/react-tooltip@1.2.8?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.542.0?external=react",
          "xlsx": "https://esm.sh/xlsx@0.18.5",
          "@winm2m/inferential-stats-js": "https://esm.sh/@winm2m/inferential-stats-js@1.0.0?external=react,react-dom",
          "@winm2m/react-stats-ui": "https://esm.sh/@winm2m/react-stats-ui?external=react,react/jsx-runtime,react-dom"
        }
      }
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      const params = new URLSearchParams(window.location.search);
      const useDevBuild = params.get("dev") === "true";
      const packageSpecifier = useDevBuild ? "/dist/index.js" : "@winm2m/react-stats-ui";
      window.__WINM2M_INFERENTIAL_WORKER_URL__ = "https://cdn.jsdelivr.net/npm/@winm2m/inferential-stats-js@1.0.0/dist/stats-worker.js";
      const { StatsWorkbench } = await import(packageSpecifier);

      function App() {
        const [language, setLanguage] = React.useState("en");
        const [theme, setTheme] = React.useState("light");
        const [layoutMode, setLayoutMode] = React.useState("full");
        const isDark = theme === "dark";

        return React.createElement(
          "div",
          {
            className: `h-full w-full p-4 max-[780px]:p-2 ${isDark ? "bg-slate-900 text-slate-100" : "bg-slate-100 text-slate-900"}`
          },
          React.createElement(
            "div",
            { className: "mb-2 flex flex-wrap items-center gap-2" },
            React.createElement("label", { className: "text-sm font-semibold" }, "Theme"),
            React.createElement(
              "select",
              {
                value: theme,
                onChange: (event) => setTheme(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "light" }, "light"),
              React.createElement("option", { value: "dark" }, "dark")
            ),
            React.createElement("label", { className: "ml-2 text-sm font-semibold" }, "Language"),
            React.createElement(
              "select",
              {
                value: language,
                onChange: (event) => setLanguage(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "en" }, "en"),
              React.createElement("option", { value: "ar" }, "ar"),
              React.createElement("option", { value: "zh" }, "zh"),
              React.createElement("option", { value: "fr" }, "fr"),
              React.createElement("option", { value: "ru" }, "ru"),
              React.createElement("option", { value: "es" }, "es"),
              React.createElement("option", { value: "ko" }, "ko"),
              React.createElement("option", { value: "ja" }, "ja"),
              React.createElement("option", { value: "vi" }, "vi")
            ),
            React.createElement("label", { className: "ml-2 text-sm font-semibold" }, "Layout"),
            React.createElement(
              "select",
              {
                value: layoutMode,
                onChange: (event) => setLayoutMode(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "full" }, "full"),
              React.createElement("option", { value: "minimal" }, "minimal")
            )
          ),
          React.createElement(
            "div",
            { className: "h-[calc(100%-2.5rem)] w-full" },
            React.createElement(StatsWorkbench, {
              className: `h-full w-full rounded-xl ${isDark ? "bg-slate-900" : "bg-white"}`,
              layoutMode,
              language
            })
          )
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(App));
    </script>
  </body>
</html>
