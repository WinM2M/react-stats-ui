<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Stats UI Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "i18next": "https://esm.sh/i18next@24.2.3",
          "react-i18next": "https://esm.sh/react-i18next@15.2.0?external=react",
          "@radix-ui/react-select": "https://esm.sh/@radix-ui/react-select@2.2.5?external=react,react-dom",
          "@radix-ui/react-separator": "https://esm.sh/@radix-ui/react-separator@1.1.7?external=react,react-dom",
          "@radix-ui/react-tabs": "https://esm.sh/@radix-ui/react-tabs@1.1.13?external=react,react-dom",
          "@radix-ui/react-tooltip": "https://esm.sh/@radix-ui/react-tooltip@1.2.8?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.542.0?external=react",
          "xlsx": "https://esm.sh/xlsx@0.18.5",
          "@winm2m/inferential-stats-js": "https://esm.sh/@winm2m/inferential-stats-js@1.0.0?external=react,react-dom",
          "@winm2m/react-stats-ui": "https://esm.sh/@winm2m/react-stats-ui?external=react,react/jsx-runtime,react-dom"
        }
      }
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      const params = new URLSearchParams(window.location.search);
      const useDevBuild = params.get("dev") === "true";
      const packageSpecifier = useDevBuild ? "/dist/index.js" : "@winm2m/react-stats-ui";
      window.__WINM2M_INFERENTIAL_WORKER_URL__ = "https://cdn.jsdelivr.net/npm/@winm2m/inferential-stats-js/dist/stats-worker.js";
      const { StatsWorkbench } = await import(packageSpecifier);

      function App() {
        const [language, setLanguage] = React.useState("en");
        const [theme, setTheme] = React.useState("light");
        const [layoutMode, setLayoutMode] = React.useState("full");
        const isDark = theme === "dark";

        const themeCss = isDark
          ? `
          .demo-theme-workbench {
            --demo-bg: #0f172a;
            --demo-text: #e2e8f0;
            --demo-border: #334155;
            --demo-major: #34d399;
            --demo-minor: #64748b;
            --demo-warning: #fbbf24;
            --demo-error: #f87171;
            --demo-info: #38bdf8;
          }

          .demo-theme-workbench .bg-white { background-color: var(--demo-bg) !important; }
          .demo-theme-workbench .text-slate-900,
          .demo-theme-workbench .text-slate-800,
          .demo-theme-workbench .text-slate-700,
          .demo-theme-workbench .text-slate-600,
          .demo-theme-workbench .text-slate-500 { color: var(--demo-text) !important; }
          .demo-theme-workbench .border-slate-200,
          .demo-theme-workbench .border-slate-300 { border-color: color-mix(in srgb, var(--demo-border) 72%, white) !important; }
          .demo-theme-workbench .border-black,
          .demo-theme-workbench .border-slate-900 { border-color: color-mix(in srgb, var(--demo-text) 82%, white) !important; }

          .demo-theme-workbench .bg-emerald-500 { background-color: var(--demo-major) !important; }
          .demo-theme-workbench .bg-emerald-100 { background-color: color-mix(in srgb, var(--demo-major) 18%, black) !important; }
          .demo-theme-workbench .text-emerald-700 { color: var(--demo-major) !important; }

          .demo-theme-workbench .bg-slate-400 { background-color: var(--demo-minor) !important; }
          .demo-theme-workbench .bg-slate-100 { background-color: color-mix(in srgb, var(--demo-minor) 16%, black) !important; }

          .demo-theme-workbench .bg-amber-500 { background-color: var(--demo-warning) !important; }
          .demo-theme-workbench .bg-amber-100 { background-color: color-mix(in srgb, var(--demo-warning) 18%, black) !important; }

          .demo-theme-workbench .bg-red-500 { background-color: var(--demo-error) !important; }
          .demo-theme-workbench .bg-red-100 { background-color: color-mix(in srgb, var(--demo-error) 18%, black) !important; }
          .demo-theme-workbench .text-red-700,
          .demo-theme-workbench .text-red-600 { color: var(--demo-error) !important; }

          .demo-theme-workbench .bg-sky-500 { background-color: var(--demo-info) !important; }
          .demo-theme-workbench .bg-sky-100 { background-color: color-mix(in srgb, var(--demo-info) 18%, black) !important; }
          .demo-theme-workbench .text-sky-700 { color: var(--demo-info) !important; }
          `
          : "";

        return React.createElement(
          "div",
          {
            className: `h-full w-full p-4 max-[780px]:p-2 ${isDark ? "bg-slate-900 text-slate-100" : "bg-slate-100 text-slate-900"}`
          },
          React.createElement(
            "div",
            { className: "mb-2 flex flex-wrap items-center gap-2" },
            React.createElement("label", { className: "text-sm font-semibold" }, "Theme"),
            React.createElement(
              "select",
              {
                value: theme,
                onChange: (event) => setTheme(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "light" }, "light"),
              React.createElement("option", { value: "dark" }, "dark")
            ),
            React.createElement("label", { className: "ml-2 text-sm font-semibold" }, "Language"),
            React.createElement(
              "select",
              {
                value: language,
                onChange: (event) => setLanguage(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "en" }, "en"),
              React.createElement("option", { value: "ar" }, "ar"),
              React.createElement("option", { value: "zh" }, "zh"),
              React.createElement("option", { value: "fr" }, "fr"),
              React.createElement("option", { value: "ru" }, "ru"),
              React.createElement("option", { value: "es" }, "es"),
              React.createElement("option", { value: "ko" }, "ko"),
              React.createElement("option", { value: "ja" }, "ja"),
              React.createElement("option", { value: "vi" }, "vi")
            ),
            React.createElement("label", { className: "ml-2 text-sm font-semibold" }, "Layout"),
            React.createElement(
              "select",
              {
                value: layoutMode,
                onChange: (event) => setLayoutMode(event.target.value),
                className: `rounded border px-2 py-1 text-sm ${isDark ? "border-slate-600 bg-slate-800 text-slate-100" : "border-slate-300 bg-white text-slate-900"}`
              },
              React.createElement("option", { value: "full" }, "full"),
              React.createElement("option", { value: "minimal" }, "minimal")
            )
          ),
          React.createElement(
            "div",
            { className: "h-[calc(100%-2.5rem)] w-full" },
            React.createElement(
              "div",
              { className: "demo-theme-workbench h-full w-full" },
              React.createElement("style", null, themeCss),
              React.createElement(StatsWorkbench, {
                className: `h-full w-full rounded-xl ${isDark ? "bg-slate-900" : "bg-white"}`,
                layoutMode,
                language
              })
            )
          )
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(App));
    </script>
  </body>
</html>
