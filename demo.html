<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Stats UI Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "@winm2m/react-stats-ui": "https://esm.sh/@winm2m/react-stats-ui?external=react,react/jsx-runtime,react-dom"
        }
      }
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: linear-gradient(180deg, #f1f5f9 0%, #ffffff 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";
      import { StatsWorkbench } from "@winm2m/react-stats-ui";

      function App() {
        return React.createElement(
          "div",
          { className: "h-full w-full p-4 max-[780px]:p-2" },
          React.createElement(StatsWorkbench, {
            className: "h-full w-full rounded-xl border border-slate-200"
          })
        );
      }

      createRoot(document.getElementById("app")).render(React.createElement(App));
    </script>
  </body>
</html>
